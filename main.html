<body class="bg-[#f8f9fb]">
  <!-- search section -->
   <nav class="shadow bg-white ">
    <section class="flex justify-between p-5 w-11/12 mx-auto flex-col md:flex-row gap-4 md:gap-0 ">
      <div class="flex gap-2 items-center">
        <img src="./image/github-logo.png" alt="" class="w-8 h-8 ">
        <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
    </div>
  
    <div class="flex gap-2">
        <label class="input input-bordered flex items-center gap-2 h-10 w-full max-w-xs bg-white border-gray-200 focus-within:border-blue-400">
  <i class="fa-solid fa-magnifying-glass text-gray-400 text-sm"></i>
  
  <input 
    type="text" 
    class="grow text-sm outline-none" 
    placeholder="Search issues..." 
  />

</label>
  <button class="btn btn-primary bg-[#4c00ff] hover:bg-[#3a00cc] border-none text-white normal-case h-10 min-h-0 px-4">
    <span class="text-xl mr-1">+</span> 
    New Issue
  </button>
  
    </div>
    
    </section>
   </nav>
 <!-- btn -->
    <section class="w-11/12 md:w-8/12 mx-auto bg-white p-6 m-10 rounded-lg border border-gray-100 shadow-sm flex flex-col md:flex-row items-center gap-2">
  <button onclick="showAll()" class="btn btn-primary h-10 w-24 bg-[#4c00ff] hover:bg-[#3a00cc] border-none text-white normal-case px-6 min-h-0 h-10 rounded-md">All</button>
  <button onclick="showOpen()" class="btn btn-ghost h-10 w-24 border border-gray-200 hover:bg-gray-50 text-slate-500 font-normal normal-case px-6 min-h-0 h-10 rounded-md">Open</button>
  <button onclick="showClosed()" class="btn btn-ghost h-10 w-24 border border-gray-200 hover:bg-gray-50 text-slate-500 font-normal normal-case px-6 min-h-0 h-10 rounded-md">Closed</button>
</section>
<!-- btn end -->

<!-- track header -->
 <section class="w-8/12 mx-auto flex flex-col md:flex-row md:items-center justify-between p-6 bg-white border border-gray-100 rounded-t-xl">
  
  <div class="flex items-center gap-4">
    <div class="w-12 h-12 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600">
      <img src="./image/Aperture.png" alt=""> </div>
    
    <div>
      <h2 class="text-xl font-bold text-slate-800">50 Issues</h2>
      <p class="text-sm text-slate-500 font-medium">Track and manage your project issues</p>
    </div>
  </div>

  <div class="flex items-center gap-6 mt-4 md:mt-0">
    <div class="flex items-center gap-2">
      <span class="w-3 h-3 rounded-full bg-emerald-500"></span>
      <span class="text-sm font-semibold text-slate-700">Open</span>
    </div>
    
    <div class="flex items-center gap-2">
      <span class="w-3 h-3 rounded-full bg-indigo-500"></span>
      <span class="text-sm font-semibold text-slate-700">Closed</span>
    </div>
  </div>

</section>

<!-- track card -->
 <section id="cardContainer" class="w-8/12 mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 py-1">
  </section>
