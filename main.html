<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B13-A5-Github-Issue-Tracker-Main</title>
    <!-- fav-icon -->
    <link rel="shortcut icon" href="./image/fav-icon.png">
    <!-- fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- tailwind+daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- responsive -->
    <link rel="stylesheet" href="./responsive.css">
</head>
<body class="">
   <nav class="flex justify-between p-5 w-11/12 mx-auto shadow">
    <div class="flex gap-2 items-center">
        <img src="./image/github-logo.png" alt="" class="w-8 h-8 ">
        <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
    </div>
  
    <div class="flex gap-2">
        <label class="input input-bordered flex items-center gap-2 h-10 w-full max-w-xs bg-white border-gray-200 focus-within:border-blue-400">
  <i class="fa-solid fa-magnifying-glass text-gray-400 text-sm"></i>
  
  <input 
    type="text" 
    class="grow text-sm outline-none" 
    placeholder="Search issues..." 
  />

</label>
  <button class="btn btn-primary bg-[#4c00ff] hover:bg-[#3a00cc] border-none text-white normal-case h-10 min-h-0 px-4">
    <span class="text-xl mr-1">+</span> 
    New Issue
  </button>
  
    </div>
    
   </nav>





   
    <script src="./script.js"></script>
</body>
